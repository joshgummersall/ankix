[tools]
go = "1.26.5"
yt-dlp = "latest"

[tasks.build]
description = "Build ankix into bin/"
run = "mkdir -p bin && go build -o bin/ankix ./cmd/ankix"

[tasks.dev]
description = "Run ankix bin"
run = "go run ./cmd/ankix"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf bin"

[tasks.setup]
description = "Scaffold local dev environment for both commands (installs deps, creates the shared ankindle Ollama model)"
dir = "ollama/vocab"
run = ["mise run install", "mise run create"]
