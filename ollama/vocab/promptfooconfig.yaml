description: ankix word-in-context translation eval

prompts:
  - "Word: {{word}} | Sentence: {{sentence}}"

providers:
  - id: ollama:chat:ankix

defaultTest:
  assert:
    - type: regex
      value: "^TRANSLATION: .+ \\| LEMMA: .+$"

tests:
  - vars:
      word: banco
      sentence: Nos sentamos en el banco del parque mientras esperábamos el autobús.
    assert:
      - type: icontains
        value: "TRANSLATION: bench"
      - type: icontains
        value: "LEMMA: bench"

  - vars:
      word: corría
      sentence: El perro corría por el jardín cuando empezó a llover.
    assert:
      - type: icontains
        value: "TRANSLATION: was running"
      - type: icontains
        value: "LEMMA: to run"

  - vars:
      word: envidia
      sentence: No pudo evitar sentir envidia al ver el nuevo coche de su vecino.
    assert:
      - type: regex
        value: "TRANSLATION: (envy|jealousy)"
      - type: regex
        value: "LEMMA: (envy|jealousy)"

  - description: "rompió a llorar idiom - burst into tears, not literal 'break' (marked as the full idiom, matching how ankix marks selections)"
    vars:
      word: rompió a llorar
      sentence: Se le hizo un nudo en la garganta y rompió a llorar sin poder contenerse.
    assert:
      - type: icontains
        value: "burst into tears"

  - vars:
      word: adelante
      sentence: A pesar de las dificultades, siguió adelante con determinación.
    assert:
      - type: icontains
        value: "TRANSLATION: forward"

  - vars:
      word: llaves
      sentence: Compré unas llaves nuevas para la puerta.
    assert:
      - type: icontains
        value: "TRANSLATION: keys"
      - type: icontains
        value: "LEMMA: key"

  - description: "must not include neighboring adjective (rule 4)"
    vars:
      word: llaves
      sentence: Compré unas llaves nuevas para la puerta.
    assert:
      - type: not-icontains
        value: "new keys"

  - description: "cuenta idiom - darse cuenta"
    vars:
      word: cuenta
      sentence: Ella se dio cuenta de que había olvidado las llaves.
    assert:
      - type: icontains
        value: "TRANSLATION: realized"
      - type: icontains
        value: "LEMMA: to realize"

  - vars:
      word: ahora
      sentence: Modelos de conjugación Preámbulo Al contemplar, ahora con tres siglos de distancia, los jalones que se sucedieron en la fundación de la Real Academia Española y el alumbramiento de su espléndida obra primera, llama la atención una peculiar circunstancia que es la reiteración, se diría que casi cabalística, aunque indudablemente casual, del número trece en los intervalos de aquellos hitos.
    assert:
      - type: icontains
        value: "TRANSLATION: now"
      - type: icontains
        value: "LEMMA: now"

  - vars:
      word: poder
      sentence: Al inicio de uno de los capítulos de Los ensayos («La libertad de conciencia», II, 19), Montaigne hace referencia a la destrucción que el fanatismo causa cuando alcanza el poder; más grave aún, según él, que la producida por las invasiones bárbaras.
    assert:
      - type: icontains
        value: "TRANSLATION: power"
      - type: icontains
        value: "LEMMA: power"

  - vars:
      word: dio
      sentence: "Leer más: Selección Mexicana: Cruz Azul base de la convocatoria ESTADISTICAS LIGA MX El club dio el salto al fútbol profesional en 1960, ingresando a la Segunda División de México."
    assert:
      - type: icontains
        value: "TRANSLATION: gave"
      - type: icontains
        value: "LEMMA: to give"

  - vars:
      word: Bajo
      sentence: Bajo el mando de Luis Fernando Tena, Cruz Azul derrotó al León y logró su octavo título de Liga.
    assert:
      - type: icontains
        value: "TRANSLATION: under"
      - type: icontains
        value: "LEMMA: under"

  - vars:
      word: alcanza
      sentence: Al inicio de uno de los capítulos de Los ensayos («La libertad de conciencia», II, 19), Montaigne hace referencia a la destrucción que el fanatismo causa cuando alcanza el poder; más grave aún, según él, que la producida por las invasiones bárbaras.
    assert:
      - type: icontains
        value: "TRANSLATION: reaches"
      - type: icontains
        value: "LEMMA: to reach"

  - vars:
      word: causa
      sentence: Al inicio de uno de los capítulos de Los ensayos («La libertad de conciencia», II, 19), Montaigne hace referencia a la destrucción que el fanatismo causa cuando alcanza el poder; más grave aún, según él, que la producida por las invasiones bárbaras.
    assert:
      - type: icontains
        value: "TRANSLATION: causes"
      - type: icontains
        value: "LEMMA: to cause"

  - vars:
      word: fanatismo
      sentence: Al inicio de uno de los capítulos de Los ensayos («La libertad de conciencia», II, 19), Montaigne hace referencia a la destrucción que el fanatismo causa cuando alcanza el poder; más grave aún, según él, que la producida por las invasiones bárbaras.
    assert:
      - type: icontains
        value: "TRANSLATION: fanaticism"
      - type: icontains
        value: "LEMMA: fanaticism"

  - vars:
      word: capítulos
      sentence: Al inicio de uno de los capítulos de Los ensayos («La libertad de conciencia», II, 19), Montaigne hace referencia a la destrucción que el fanatismo causa cuando alcanza el poder; más grave aún, según él, que la producida por las invasiones bárbaras.
    assert:
      - type: icontains
        value: "TRANSLATION: chapters"
      - type: icontains
        value: "LEMMA: chapter"

  - vars:
      word: inicio
      sentence: Al inicio de uno de los capítulos de Los ensayos («La libertad de conciencia», II, 19), Montaigne hace referencia a la destrucción que el fanatismo causa cuando alcanza el poder; más grave aún, según él, que la producida por las invasiones bárbaras.
    assert:
      - type: icontains
        value: "TRANSLATION: beginning"
      - type: icontains
        value: "LEMMA: beginning"

  - description: "seas quien seas idiom"
    vars:
      word: seas quien seas
      sentence: Como dibujé una pelota enorme en la portada, sé que a ti también te gusta el fútbol, y creo que, seas quien seas, sin importar tu aspecto o a qué escuela vayas, en qué país, ciudad, pueblo o granja vivas, estarás de acuerdo en que lo que estás a punto de leer es la historia más increíble sobre fútbol que jamás hayas oído.
    assert:
      - type: icontains
        value: "TRANSLATION: whoever you are"

  - vars:
      word: heredero
      sentence: "Pero la inexactitud filológica es compensada con creces por otro tipo de rigor: el de quien se enfrenta al gran dilema de la vida o la muerte, y no sólo de su propia persona, también de la civilización de la que se siente heredero y actor."
    assert:
      - type: icontains
        value: "TRANSLATION: heir"
      - type: icontains
        value: "LEMMA: heir"

  - description: "el arco - soccer sense, not architectural arch"
    vars:
      word: el arco
      sentence: Demasiados defensas se interpusieron entre el arco y yo como para meterla yo solo.
    assert:
      - type: icontains
        value: "TRANSLATION: the goal"
      - type: not-icontains
        value: "arch"

  - description: "gancho - hook move, not pass"
    vars:
      word: gancho
      sentence: Volví a cortar hacia la derecha, un rápido uno-dos de gancho, y lo rebasé como si estuviera parado.
    assert:
      - type: icontains
        value: "TRANSLATION: hook"
      - type: icontains
        value: "LEMMA: hook"

  - description: "puntería - aim, not kick"
    vars:
      word: puntería
      sentence: Pero tengo una puntería increíble, los pases más creativos que jamás verás y movimientos que podrían romper Internet.
    assert:
      - type: icontains
        value: "TRANSLATION: aim"
      - type: icontains
        value: "LEMMA: aim"

  - description: "bigotes - mustache, not sideburns"
    vars:
      word: bigotes
      sentence: Me doblaba en estatura, tenía bigotes y aparentaba unos dieciocho.
    assert:
      - type: icontains
        value: "mustache"
      - type: not-icontains
        value: "sideburns"

  - description: "desde - spatial 'from', not temporal 'since'"
    vars:
      word: desde
      sentence: Todos los padres alentaban desde la tribuna como si fuera la Copa del Mundo y Estados Unidos estuviera en la final.
    assert:
      - type: icontains
        value: "TRANSLATION: from"
      - type: icontains
        value: "LEMMA: from"

  - description: "al rato - a while later, not 'at once'"
    vars:
      word: al rato
      sentence: Pero al rato tuve otra oportunidad.
    assert:
      - type: not-icontains
        value: "at once"

  - description: "repartidos - divided/distributed, not awarded"
    vars:
      word: repartidos
      sentence: Es considerada una de las ligas más dominantes en la CONCACAF, ya que a través de los clubes que la han representado se han ganado unos 44 títulos, repartidos entre oficiales e internacionales.
    assert:
      - type: regex
        value: "(divid|distribut)"
      - type: not-icontains
        value: "awarded"

  - description: "relieve - geographic relief (terrain), not the verb 'to relieve'. LEMMA occasionally still says 'to relieve'; TRANSLATION is what lands on the card and is what we actually assert here."
    vars:
      word: relieve
      sentence: Pero la diferencia es que esas islas son volcánicas, se originaron por volcanes y por eso son islas que tienen mucho relieve, que tienen muchas montañas, mientras que en el caso de Barbados es diferente porque es una isla hecha de coral.
    assert:
      - type: icontains
        value: "TRANSLATION: relief"
