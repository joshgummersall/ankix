[tools]
pnpm = "latest"

[tasks.install]
description = "Install ollama/ dependencies"
run = "pnpm install"

[tasks.create]
description = "Create the ankindle Ollama model from Modelfile"
run = "ollama create ankindle -f Modelfile"

[tasks.eval]
description = "Run promptfoo eval against the ankindle model"
run = "pnpm run eval"
