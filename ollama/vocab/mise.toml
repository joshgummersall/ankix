[tools]
pnpm = "latest"

[tasks.install]
description = "Install ollama/ dependencies"
run = "pnpm install"

[tasks.create]
description = "Create the ankix Ollama model from Modelfile"
run = "ollama create ankix -f Modelfile"

[tasks.eval]
description = "Run promptfoo eval against the ankix model"
run = "pnpm run eval"
